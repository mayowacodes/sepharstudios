version: "3.8"

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26
    container_name: sephar-minio-dev
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-dev-data:/data
    command: server /data --console-address ":9001"

volumes:
  minio-dev-data: